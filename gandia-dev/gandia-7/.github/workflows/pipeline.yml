name: Handeia Radar Pipeline

on:
  schedule:
    # Cada 6 horas: 0:00, 6:00, 12:00, 18:00 UTC (equivale a 19:00, 01:00, 07:00, 13:00 CDMX)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Permite correr manualmente desde GitHub Actions

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
        run: npx tsx scripts/pipeline-noticias.ts

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline falló en $(date)" >> $GITHUB_STEP_SUMMARY