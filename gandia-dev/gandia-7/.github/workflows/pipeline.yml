name: Handeia Radar Pipeline

on:
  schedule:
    # Cada 3 días a las 8:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch:
    # Permite correr manualmente desde GitHub Actions

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
        run: npx tsx scripts/pipeline-noticias.ts

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline falló en $(date)" >> $GITHUB_STEP_SUMMARY